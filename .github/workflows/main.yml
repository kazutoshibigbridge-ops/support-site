name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: w9jds/firebase-action@master
        with:
          args: deploy --only hosting --project glp-1-nexatrack
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
